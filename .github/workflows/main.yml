name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # To naprawia błąd z Node.js 20
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4 # Nowsza wersja v4
        with:
          cache-disabled: true # Wyłączamy cache, bo serwery GitHuba leżą

      - name: Build APK
        run: |
          if [ ! -f gradlew ]; then gradle wrapper --gradle-version 8.1.1; fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BrawlPass_Final_App
          path: app/build/outputs/apk/debug/app-debug.apk
